<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>TravelGo — Luxury Travel & Tour Packages</title>
    <meta name="description" content="TravelGo is a premium luxury travel agency offering curated tour packages to Santorini, Maldives, Bali, Swiss Alps and 80+ destinations worldwide. Book your dream journey today." />

    <meta name="author" content="TravelGo" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.travelgo.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TravelGo" />
    <meta property="og:title" content="TravelGo — Luxury Travel & Tour Packages" />
    <meta property="og:description" content="Discover 500+ curated luxury tour packages. Santorini sunsets, Maldives overwater villas, Bali temples. Your dream journey starts here." />

    <meta property="og:url" content="https://www.travelgo.com/" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@travelgo" />
    <meta name="twitter:title" content="TravelGo — Luxury Travel & Tour Packages" />
    <meta name="twitter:description" content="500+ curated luxury tour packages. Santorini, Maldives, Bali & more." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=1200&q=85" />

    <!-- PWA / Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TravelGo" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://randomuser.me" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />

    <script type="application/ld+json">

      "@context": "https://schema.org",

        "postalCode": "400050",
        "addressCountry": "IN"
      },

      "email": "hello@travelgo.com",

        "https://www.facebook.com/travelgo",
        "https://www.instagram.com/travelgo",
        "https://twitter.com/travelgo"
      ],
      "priceRange": "$$$"
    }
