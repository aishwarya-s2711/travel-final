<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>TravelGo — Premium Tour Packages & Bespoke Travel Agency</title>
    <meta name="description" content="TravelGo is a premium luxury travel agency offering curated tour packages to Santorini, Maldives, Bali, Swiss Alps and 80+ destinations worldwide. Book your dream journey today." />
    <meta name="keywords" content="luxury travel, TravelGo, tour packages, Santorini, Maldives, Bali, Switzerland, travel agency, honeymoon packages" />
    <meta name="author" content="TravelGo" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.travelgo.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TravelGo" />
    <meta property="og:title" content="TravelGo — Premium Tour Packages & Bespoke Travel Agency" />
    <meta property="og:description" content="Discover curated luxury tour packages. Santorini sunsets, Maldives overwater villas, Bali temples. Your dream journey starts here." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=1200&q=85" />
    <meta property="og:url" content="https://www.travelgo.com/" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@travelgo" />
    <meta name="twitter:title" content="TravelGo — Premium Tour Packages & Bespoke Travel Agency" />
    <meta name="twitter:description" content="Curated luxury tour packages. Santorini, Maldives, Bali & more." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=1200&q=85" />

    <!-- PWA / Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TravelGo" />

    <!-- Favicon - Modern TravelGo Logo -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://randomuser.me" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "TravelGo",
      "url": "https://www.travelgo.com",
      "logo": "https://www.travelgo.com/favicon.svg",
      "description": "Premium luxury travel and tour planning agency offering curated tour packages worldwide.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Travel Street, Bandra West",
        "addressLocality": "Mumbai",
        "addressRegion": "Maharashtra",
        "postalCode": "400050",
        "addressCountry": "IN"
      },
      "telephone": "+91-22-2572-2545",
      "email": "hello@travelgo.com",
      "sameAs": [
        "https://www.facebook.com/travelgo",
        "https://www.instagram.com/travelgo",
        "https://twitter.com/travelgo"
      ],
      "priceRange": "$$$"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
